<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Comfortaa:700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Comfortaa', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    color: white;
}

/* HEADER */
.header {
    padding: 18px;
    background: linear-gradient(90deg, #ED2129, #ff7a00);
    position: relative;
    overflow: hidden;
}

/* brilho passando */
.header::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shine 5s infinite;
}

@keyframes shine {
    to { left: 100%; }
}

/* LOGOS */
#sponsorTrack {
    position: relative;
    height: 30px;
}

#sponsorTrack a {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 1s ease;
}

#sponsorTrack a.active {
    opacity: 1;
}

#sponsorTrack img {
    height: 26px;
    max-width: 160px;
    object-fit: contain;
}

/* COVER */
.cover {
    height: 220px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* TEXTO */
.text-box {
    position: relative;
    overflow: hidden;
    padding: 0 20px;
    margin-top: 10px;
}

.text-box::before,
.text-box::after {
    content: "";
    position: absolute;
    top: 0;
    width: 30px;
    height: 100%;
}

.text-box::before {
    left: 0;
    background: linear-gradient(to right, #0f0f0f, transparent);
}

.text-box::after {
    right: 0;
    background: linear-gradient(to left, #0f0f0f, transparent);
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
    animation: scrollText 12s linear infinite;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* PLAYER */
.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #ED2129;
    background: rgba(237,33,41,0.15);
    color: white;
    font-size: 22px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.1);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px;
    padding: 20px;
}

.card {
    background: #141414;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
}

.card img {
    width: 28px;
}

/* NEWS */
#newsDisplay {
    margin: 10px 20px 20px;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid #ED2129;
    background: #000;
    overflow: hidden;
}

#newsTicker {
    white-space: nowrap;
    animation: ticker 12s linear infinite;
}

@keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER COMERCIAL -->
<div class="header">
  <div id="sponsorTrack">

    <a href="https://www.caixa.gov.br" target="_blank" class="active">
      <img src="https://logo.clearbit.com/caixa.gov.br">
    </a>

    <a href="https://www.gov.br" target="_blank">
      <img src="https://logo.clearbit.com/brasil.gov.br">
    </a>

    <a href="https://www.ceara.gov.br" target="_blank">
      <img src="https://logo.clearbit.com/ceara.gov.br">
    </a>

  </div>
</div>

<div class="cover"></div>

<div class="text-box">
<span id="artistText" class="scroll-text">Carregando artista...</span>
</div>

<div class="text-box">
<span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"><br>Instagram
</div>

<div class="card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg"><br>Threads
</div>

<div class="card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg"><br>Participar
</div>
</div>

<div id="newsDisplay">
<div id="newsTicker">Carregando notícias...</div>
</div>

<div class="footer">MiB é made in Brasil, baby</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player = document.getElementById('radioPlayer');

function playRadio(){
player.src="https://r10.ciclano.io/proxy/radiomib/stream";
player.play();
}

function stopRadio(){
player.pause();
}

/* CENTOVA */
setInterval(()=>{
document.getElementById("artistText").innerText =
document.getElementById("ccArtist").innerText || "—";

document.getElementById("titleText").innerText =
document.getElementById("ccTitle").innerText || "—";
},2000);

/* ROTAÇÃO PATROCINADORES */
const sponsors=document.querySelectorAll("#sponsorTrack a");
let s=0;

setInterval(()=>{
sponsors[s].classList.remove("active");
s=(s+1)%sponsors.length;
sponsors[s].classList.add("active");
},3000);

/* LINKS */
function openInsta(){window.open("https://www.instagram.com/radiomibprodutora/")}
function openThreads(){window.open("https://www.threads.net/@radiomibprodutora")}
function participar(){window.open("https://wa.me/5585988148344")}

/* NEWS */
const noticias=[
"🎵 Música brasileira em alta global",
"🌴 Ceará em destaque no turismo",
"✈️ Viagens internacionais crescendo",
"🔬 Novas descobertas científicas"
];

let i=0;
setInterval(()=>{
document.getElementById("newsTicker").innerText=noticias[i];
i=(i+1)%noticias.length;
},4000);
</script>

</body>
</html>
