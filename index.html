<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #0d0d0d;
    color: #e5e5e5;
}

/* HEADER */
.header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* PATROCINADORES */
#sponsorTrack {
    position: relative;
    width: 100%;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#sponsorTrack a {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
}

#sponsorTrack a.active {
    opacity: 1;
}

#sponsorTrack img {
    height: 20px;
    max-width: 140px;
    object-fit: contain;
    filter: brightness(1.2) contrast(1.1);
}

/* COVER */
.cover {
    height: 200px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* TEXTO COM SCROLL - ARTISTA */
.scroll-box {
    position: relative;
    overflow: hidden;
    padding: 12px 20px;
    font-size: 13px;
    min-height: 24px;
    display: flex;
    align-items: center;
}

/* fade lateral */
.scroll-box::before,
.scroll-box::after {
    content: "";
    position: absolute;
    top: 0;
    width: 30px;
    height: 100%;
    z-index: 2;
}

.scroll-box::before {
    left: 0;
    background: linear-gradient(to right, #0d0d0d, transparent);
}

.scroll-box::after {
    right: 0;
    background: linear-gradient(to left, #0d0d0d, transparent);
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
    padding: 0 10px;
    animation: scrollText linear infinite;
    min-width: max-content;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* PLAYER */
.controls {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 10px;
}

.btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
}

/* REDES */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    padding: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s ease;
}

.card:hover {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
}

.card img {
    width: 22px;
    margin-bottom: 5px;
}

/* NEWS - ESTILO NOTICIÁRIO DE TV */
.news-bar {
    background: linear-gradient(90deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a1a 100%);
    border-top: 2px solid rgba(220, 20, 60, 0.6);
    border-bottom: 2px solid rgba(220, 20, 60, 0.6);
    overflow: hidden;
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    position: relative;
}

/* Ícone de notícia */
.news-bar::before {
    content: "📰";
    display: inline-block;
    margin-right: 10px;
    font-size: 16px;
    flex-shrink: 0;
}

.news-track {
    white-space: nowrap;
    animation: scroll linear infinite;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #e5e5e5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 11px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div id="sponsorTrack">

<a href="https://www.coca-cola.com" target="_blank" class="active">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/320px-Coca-Cola_logo.svg.png" alt="Coca-Cola">
</a>

<a href="https://www.burgerking.com" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Burger_King_logo.svg/320px-Burger_King_logo.svg.png" alt="Burger King">
</a>

<a href="https://www.mcdonalds.com" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/McDonald%27s_logo.svg/320px-McDonald%27s_logo.svg.png" alt="McDonald's">
</a>

</div>
</div>

<div class="cover"></div>

<div class="scroll-box">
<span id="artistText" class="scroll-text">Carregando artista...</span>
</div>

<div class="scroll-box">
<span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
Instagram
</div>

<div class="card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg" alt="Threads">
Threads
</div>

<div class="card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" alt="WhatsApp">
Participar
</div>
</div>

<div class="news-bar">
<div id="newsTrack" class="news-track"></div>
</div>

<div class="footer">MiB Digital Broadcast</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player=document.getElementById('radioPlayer');

function playRadio(){
player.src="https://r10.ciclano.io/proxy/radiomib/stream";
player.play();
}

function stopRadio(){
player.pause();
}

/* ATUALIZA TEXTO + VELOCIDADE DINÂMICA */
function atualizarTexto(){
const artist=document.getElementById("ccArtist").innerText || "—";
const title=document.getElementById("ccTitle").innerText || "—";

const artistEl=document.getElementById("artistText");
const titleEl=document.getElementById("titleText");

artistEl.innerText=artist;
titleEl.innerText=title;

/* velocidade proporcional com mínimo */
const artistDuration = Math.max(5, artist.length * 0.35);
const titleDuration = Math.max(5, title.length * 0.35);

artistEl.style.animationDuration = artistDuration + "s";
titleEl.style.animationDuration = titleDuration + "s";
}

setInterval(atualizarTexto,2000);

/* patrocinadores */
const sponsors=document.querySelectorAll("#sponsorTrack a");
let s=0;
setInterval(()=>{
sponsors[s].classList.remove("active");
s=(s+1)%sponsors.length;
sponsors[s].classList.add("active");
},4000);

/* links */
function openInsta(){window.open("https://www.instagram.com/radiomibprodutora/")}
function openThreads(){window.open("https://www.threads.net/@radiomibprodutora")}
function participar(){window.open("https://wa.me/5585988148344")}

/* news */
const noticias=[
"Música brasileira em crescimento global",
"Turismo no Ceará bate recordes",
"Viagens internacionais retomam força",
"Descobertas científicas avançam rapidamente"
];

const track=document.getElementById("newsTrack");

track.innerText = noticias.join("   •   ") + "   •   " + noticias.join("   •   ");

const duration = track.innerText.length * 0.25;
track.style.animationDuration = duration + "s";
</script>

</body>
</html>
