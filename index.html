<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden; /* Evita barra horizontal */
}

/* PLAYER */
.player-bar {
    position: fixed;
    top: 0;
    width: 100%;
    max-width: 1920px; /* limite de tela grande */
    margin: 0 auto;
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    z-index: 10;
}

.logo {
    height: 40px;
    margin-right: 15px;
}

.track-info {
    flex: 1;
    overflow: hidden;
}

.scroll-text {
    display: inline-block;
    animation: scroll 10s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.controls button {
    margin-left: 10px;
    padding: 8px 12px;
    background: #ED2129;
    border: none;
    color: white;
    cursor: pointer;
}

/* HERO (notícia destaque) */
.hero {
    margin: 70px auto 0 auto;
    max-width: 1920px;
    height: 50vh;
    position: relative;
    overflow: hidden;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.hero-text {
    position: absolute;
    bottom: 0;
    padding: 20px;
    font-size: 24px;
    width: 100%;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* GRID */
.news-container {
    max-width: 1920px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.news-card {
    position: relative;
    height: 200px;
    cursor: pointer;
    overflow: hidden;
}

.news-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.news-overlay {
    position: absolute;
    bottom: 0;
    padding: 10px;
    font-size: 13px;
    width: 100%;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* RESPONSIVO MOBILE */
@media(max-width:600px){
    .hero { height: 35vh; }
    .news-container { grid-template-columns: 1fr; }
}
</style>
