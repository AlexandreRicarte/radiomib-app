<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio MIB Broadcast</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* TOPO */
.top-bar {
  background: linear-gradient(to right, #111, #1a1a1a);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 2px solid #ED2129;
}

.logo {
  height: 50px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

/* PLAYER */
.player {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 8px 12px;
  border-radius: 6px;
}

#playBtn {
  background: #ED2129;
  border: none;
  color: white;
  padding: 8px 10px;
  cursor: pointer;
}

.live {
  background: red;
  padding: 3px 6px;
  font-size: 12px;
  border-radius: 3px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 10px;
  height: calc(100vh - 80px);
}

.card {
  position: relative;
  overflow: hidden;
  background: black;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* HEADER DO CARD */
.source {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 8px;
  font-weight: bold;
}

.source.g1 { background: #c4170c; }
.source.globo { background: #003366; }
.source.uol { background: #ffcc00; color: black; }
.source.folha { background: #ddd; color: black; }

/* TEXTO */
.headline {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
}
</style>
</head>

<body>

<div class="top-bar">
  <img src="logo.png" class="logo">
  <div class="title">RÁDIO MIB DIGITAL BROADCAST</div>

  <div class="player">
    <button id="playBtn">▶</button>
    <span class="live">AO VIVO</span>
  </div>
</div>

<div class="container" id="grid"></div>

<audio id="radio" autoplay></audio>

<script>
const STREAM = "https://r10.ciclano.io/proxy/radiomib/stream";
const RSS = "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419";

const FALLBACK = "fallback.jpg";

const sources = ["g1", "globo", "uol", "folha"];

const audio = document.getElementById("radio");
const btn = document.getElementById("playBtn");

audio.src = STREAM;
audio.play().catch(() => {});

btn.onclick = () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
};

async function loadNews() {
  try {
    const res = await fetch(RSS);
    const data = await res.json();

    const news = data.items.slice(0, 4);
    const grid = document.getElementById("grid");

    grid.innerHTML = "";

    news.forEach((item, i) => {
      const card = document.createElement("div");
      card.className = "card";

      const srcClass = sources[i % sources.length];

      const imgUrl = item.thumbnail || FALLBACK;

      card.innerHTML = `
        <div class="source ${srcClass}">
          ${srcClass.toUpperCase()}
        </div>

        <img src="${imgUrl}"
             onerror="this.src='${FALLBACK}'">

        <div class="headline">
          ${item.title}
        </div>
      `;

      grid.appendChild(card);
    });

  } catch (e) {
    console.log("Erro RSS:", e);
  }
}

loadNews();
setInterval(loadNews, 60000);
</script>

</body>
</html>
