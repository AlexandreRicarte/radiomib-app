<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Inter:400,600&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #0d0d0d;
    color: #e5e5e5;
}

/* HEADER TECNOLÓGICO */
.header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative;
}

/* patrocinadores */
#sponsorTrack {
    position: relative;
    width: 100%;
    height: 30px;
}

#sponsorTrack a {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 1.2s ease;
}

#sponsorTrack a.active {
    opacity: 0.9;
}

#sponsorTrack img {
    height: 22px;
    filter: grayscale(1) brightness(1.8);
}

/* COVER */
.cover {
    height: 200px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* TEXTOS */
.info {
    padding: 15px 20px;
    font-size: 13px;
    letter-spacing: 0.3px;
    opacity: 0.85;
}

/* PLAYER */
.controls {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 10px;
}

.btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.btn:hover {
    background: rgba(255,255,255,0.05);
}

/* REDES */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    padding: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
}

.card img {
    width: 22px;
    margin-bottom: 5px;
}

/* NEWS PROFISSIONAL */
.news-bar {
    position: relative;
    background: #000;
    border-top: 1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
    height: 40px;
    display: flex;
    align-items: center;
}

.news-track {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: newsScroll linear infinite;
    font-size: 13px;
    letter-spacing: 0.4px;
}

/* VELOCIDADE MAIS LENTA E LEGÍVEL */
@keyframes newsScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 11px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<div id="sponsorTrack">

<a href="https://www.caixa.gov.br" target="_blank" class="active">
<img src="https://logo.clearbit.com/caixa.gov.br">
</a>

<a href="https://www.gov.br" target="_blank">
<img src="https://logo.clearbit.com/brasil.gov.br">
</a>

<a href="https://www.ceara.gov.br" target="_blank">
<img src="https://logo.clearbit.com/ceara.gov.br">
</a>

</div>
</div>

<div class="cover"></div>

<div class="info" id="artistText">Carregando artista...</div>
<div class="info" id="titleText">Carregando música...</div>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
Instagram
</div>

<div class="card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg">
Threads
</div>

<div class="card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg">
Participar
</div>
</div>

<!-- NEWS CONTÍNUO -->
<div class="news-bar">
<div id="newsTrack" class="news-track"></div>
</div>

<div class="footer">MiB Digital Broadcast</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player=document.getElementById('radioPlayer');

function playRadio(){
player.src="https://r10.ciclano.io/proxy/radiomib/stream";
player.play();
}

function stopRadio(){
player.pause();
}

/* CENTOVA */
setInterval(()=>{
document.getElementById("artistText").innerText =
document.getElementById("ccArtist").innerText || "—";

document.getElementById("titleText").innerText =
document.getElementById("ccTitle").innerText || "—";
},2000);

/* PATROCINADORES SUAVE */
const sponsors=document.querySelectorAll("#sponsorTrack a");
let s=0;
setInterval(()=>{
sponsors[s].classList.remove("active");
s=(s+1)%sponsors.length;
sponsors[s].classList.add("active");
},4000);

/* LINKS */
function openInsta(){window.open("https://www.instagram.com/radiomibprodutora/")}
function openThreads(){window.open("https://www.threads.net/@radiomibprodutora")}
function participar(){window.open("https://wa.me/5585988148344")}

/* NEWS CONTÍNUO SEM CORTE */
const noticias=[
"🎵 Música brasileira em crescimento global",
"🌴 Turismo no Ceará bate recordes",
"✈️ Viagens internacionais retomam força",
"🔬 Descobertas científicas avançam rapidamente"
];

const track=document.getElementById("newsTrack");

/* junta tudo em uma linha contínua */
track.innerText = noticias.join("   •   ") + "   •   " + noticias.join("   •   ");

/* define velocidade baseada no tamanho */
const duration = track.innerText.length * 0.25;
track.style.animationDuration = duration + "s";
</script>

</body>
</html>
