<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Comfortaa:700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Comfortaa', sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
.header {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
}

/* PATROCINADORES - DESLIZAM PELA TELA */
#sponsorTrack {
    position: relative;
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
}

#sponsorTrack a {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slideSponsor linear infinite;
}

#sponsorTrack img {
    height: 60px;
    max-width: 180px;
    object-fit: contain;
    filter: brightness(1.3) contrast(1.1);
}

@keyframes slideSponsor {
    0% {
        left: 100%;
    }
    100% {
        left: -200px;
    }
}

#sponsorTrack a:nth-child(1) {
    animation-duration: 12s;
    animation-delay: 0s;
}

#sponsorTrack a:nth-child(2) {
    animation-duration: 12s;
    animation-delay: 4s;
}

#sponsorTrack a:nth-child(3) {
    animation-duration: 12s;
    animation-delay: 8s;
}

/* COVER */
.cover {
    height: 240px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* SEÇÃO PRINCIPAL */
.section {
    padding: 20px;
    text-align: center;
}

.text3d {
    font-size: 22px;
    color: #ED2129;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

/* SCROLL TEXT - ARTISTA E MÚSICA */
.scroll-text {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    animation: scrollText 10s linear infinite;
    font-size: 14px;
    margin: 8px 0;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* PLAYER */
.controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #ED2129;
    background: rgba(237,33,41,0.1);
    cursor: pointer;
    color: white;
    font-size: 20px;
    transition: all 0.3s ease;
}

.btn:hover {
    background: rgba(237,33,41,0.2);
}

/* REDES */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.card {
    background: #141414;
    padding: 15px;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 13px;
}

.card:hover {
    background: #1a1a1a;
}

/* NEWS - ESTILO NOTICIÁRIO DE TV */
#rssFeed {
    margin-top: 20px;
}

.news-item {
    background: linear-gradient(90deg, #1a1a1a 0%, #0b0b0b 50%, #1a1a1a 100%);
    border-top: 2px solid rgba(220, 20, 60, 0.6);
    border-bottom: 2px solid rgba(220, 20, 60, 0.6);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.news-item:hover {
    background: linear-gradient(90deg, #242424 0%, #151515 50%, #242424 100%);
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div id="sponsorTrack">

<a href="https://www.coca-cola.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23F40000' width='320' height='320'/%3E%3Ctext x='160' y='180' font-size='80' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3ECoca%3C/text%3E%3Ctext x='160' y='260' font-size='80' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3ECola%3C/text%3E%3C/svg%3E" alt="Coca-Cola">
</a>

<a href="https://www.burgerking.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23FFC72C' width='320' height='320'/%3E%3Ctext x='160' y='180' font-size='60' font-weight='bold' fill='%23EC1C24' text-anchor='middle' font-family='Arial'%3EBURGER%3C/text%3E%3Ctext x='160' y='260' font-size='60' font-weight='bold' fill='%23EC1C24' text-anchor='middle' font-family='Arial'%3EKING%3C/text%3E%3C/svg%3E" alt="Burger King">
</a>

<a href="https://www.mcdonalds.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23DA291C' width='320' height='320'/%3E%3Ctext x='160' y='200' font-size='100' font-weight='bold' fill='%23FFC72C' text-anchor='middle' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E" alt="McDonald's">
</a>

</div>
</div>

<div class="cover"></div>

<div class="section">

<div class="text3d">AO VIVO</div>

<span id="artistText" class="scroll-text">Carregando artista...</span>
<span id="titleText" class="scroll-text">Carregando música...</span>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">📸 Instagram</div>
<div class="card" onclick="openThreads()">🧵 Threads</div>
<div class="card" onclick="participar()">🎙️ Participar</div>
<div class="card">📰 Notícias</div>
</div>

<div id="rssFeed"></div>

</div>

<div class="footer">MiB é made in Brasil, baby</div>

</div>

<!-- PLAYER -->
<audio id="radioPlayer" preload="none">
<source src="https://r10.ciclano.io/proxy/radiomib/stream" type="audio/mpeg" />
</audio>

<!-- CENTOVA -->
<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player = document.getElementById('radioPlayer');

/* PLAYER */
function playRadio() {
    player.src = "https://r10.ciclano.io/proxy/radiomib/stream?t=" + Date.now();
    player.play();
}

function stopRadio() {
    player.pause();
    player.currentTime = 0;
}

/* REDES */
function openInsta() {
    window.open("https://www.instagram.com/radiomibprodutora/", "_blank");
}

function openThreads() {
    window.open("https://www.threads.net/@radiomibprodutora", "_blank");
}

function participar() {
    window.open("https://wa.me/5585988148344?text=Estou%20ouvindo%20a%20Rádio%20MIB!", "_blank");
}

/* METADATA */
function mirrorText(fromEl, toEl, placeholder) {
    const txt = (fromEl.textContent || "").trim();
    toEl.textContent = txt || placeholder;
}

function setupObservers() {
    const artistSrc = document.getElementById('ccArtist');
    const titleSrc  = document.getElementById('ccTitle');
    const artistOut = document.getElementById('artistText');
    const titleOut  = document.getElementById('titleText');

    const cfg = { childList: true, subtree: true };

    new MutationObserver(() => {
        mirrorText(artistSrc, artistOut, "—");
    }).observe(artistSrc, cfg);

    new MutationObserver(() => {
        mirrorText(titleSrc, titleOut, "—");
    }).observe(titleSrc, cfg);
}

setupObservers();

/* RSS REAL FUNCIONANDO */
const feeds = [
"https://news.google.com/rss/search?q=música&hl=pt-BR&gl=BR&ceid=BR:pt-419",
"https://news.google.com/rss/search?q=turismo+ceará&hl=pt-BR&gl=BR&ceid=BR:pt-419",
"https://news.google.com/rss/search?q=viagens+internacionais&hl=pt-BR&gl=BR&ceid=BR:pt-419",
"https://news.google.com/rss/search?q=descobertas+científicas&hl=pt-BR&gl=BR&ceid=BR:pt-419"
];

let noticias = [];

async function carregarFeeds() {
    for (let feed of feeds) {
        try {
            const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(feed));
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");

            const items = xml.querySelectorAll("item");

            items.forEach(item => {
                noticias.push({
                    title: item.querySelector("title")?.textContent,
                    link: item.querySelector("link")?.textContent
                });
            });

        } catch(e) {
            console.log("Erro no feed:", e);
        }
    }

    mostrarNoticias();
}

function mostrarNoticias() {
    const container = document.getElementById("rssFeed");

    setInterval(() => {
        if (noticias.length === 0) return;

        const n = noticias[Math.floor(Math.random() * noticias.length)];

        container.innerHTML = `
            <div class="news-item" onclick="window.open('${n.link}', '_blank')">
                📰 ${n.title}
            </div>
        `;
    }, 4000);
}

carregarFeeds();
</script>

</body>
</html>
