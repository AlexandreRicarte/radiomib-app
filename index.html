<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB - Painel Indoor</title>

<link href="https://fonts.googleapis.com/css?family=Inter:400,600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
}

/* PLAYER */
.player-bar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    z-index: 10;
}

.logo {
    height: 40px;
    margin-right: 15px;
}

.track-info {
    flex: 1;
    overflow: hidden;
}

.scroll-text {
    display: inline-block;
    animation: scroll 10s linear infinite;
}

@keyframes scroll {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.controls button {
    margin-left: 10px;
    padding: 8px 12px;
    background: #ED2129;
    border: none;
    color: white;
    cursor: pointer;
}

/* HERO (notícia destaque) */
.hero {
    margin-top: 70px;
    height: 50vh;
    position: relative;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-text {
    position: absolute;
    bottom: 0;
    padding: 20px;
    font-size: 24px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* GRID */
.news-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.news-card {
    position: relative;
    height: 200px;
    cursor: pointer;
}

.news-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.news-overlay {
    position: absolute;
    bottom: 0;
    padding: 10px;
    font-size: 13px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* MOBILE */
@media(max-width:600px){
    .hero { height: 35vh; }
}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player-bar">
<img class="logo" src="https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png">

<div class="track-info">
<span id="artistText" class="scroll-text">Carregando artista...</span><br>
<span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div class="controls">
<button onclick="playRadio()">▶</button>
<button onclick="stopRadio()">■</button>
</div>
</div>

<!-- HERO -->
<div class="hero" id="hero">
<img id="heroImg" src="https://source.unsplash.com/1200x600/?music">
<div class="hero-text" id="heroText">Carregando notícias...</div>
</div>

<!-- GRID -->
<div id="newsContainer" class="news-container"></div>

<audio id="radioPlayer"></audio>

<!-- METADATA -->
<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player = document.getElementById('radioPlayer');

function playRadio(){
player.src="https://r10.ciclano.io/proxy/radiomib/stream";
player.play().catch(()=>{});
}

function stopRadio(){
player.pause();
}

/* METADATA */
setInterval(()=>{
artistText.innerText = ccArtist.innerText || "—";
titleText.innerText = ccTitle.innerText || "—";
},2000);

/* RSS */
const feeds = [
"https://news.google.com/rss/search?q=música",
"https://news.google.com/rss/search?q=turismo",
"https://news.google.com/rss/search?q=viagem",
"https://news.google.com/rss/search?q=ciência"
];

let noticias = [];
let index = 0;

async function carregarNoticias(){
const container = document.getElementById("newsContainer");

for (let feed of feeds){
try{
const res = await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(feed));
const data = await res.json();

const parser = new DOMParser();
const xml = parser.parseFromString(data.contents,"text/xml");

xml.querySelectorAll("item").forEach(item=>{
noticias.push({
title: item.querySelector("title")?.textContent,
link: item.querySelector("link")?.textContent
});
});

}catch(e){}
}

renderNoticias();
rotacionarHero();
}

function renderNoticias(){
const container = document.getElementById("newsContainer");
container.innerHTML = "";

noticias.slice(0,12).forEach(n=>{
const card = document.createElement("div");
card.className="news-card";

card.innerHTML = `
<img src="https://source.unsplash.com/400x300/?entertainment">
<div class="news-overlay">${n.title}</div>
`;

card.onclick = ()=>window.open(n.link);

container.appendChild(card);
});
}

/* ROTAÇÃO TIPO TV */
function rotacionarHero(){
setInterval(()=>{
if(noticias.length === 0) return;

const n = noticias[index];

heroText.innerText = n.title;
heroImg.src = "https://source.unsplash.com/1200x600/?concert";

index = (index + 1) % noticias.length;

},5000);
}

carregarNoticias();

/* AUTO PLAY */
setTimeout(playRadio, 3000);
</script>

</body>
</html>
