<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Comfortaa:700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Comfortaa', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* HEADER PREMIUM */
.header {
    padding: 15px;
    background: linear-gradient(90deg, #ED2129, #ff7a00);
    position: relative;
    overflow: hidden;
}

/* fade lateral */
.header::before,
.header::after {
    content: "";
    position: absolute;
    top: 0;
    width: 40px;
    height: 100%;
}

.header::before {
    left: 0;
    background: linear-gradient(to right, #ED2129, transparent);
}

.header::after {
    right: 0;
    background: linear-gradient(to left, #ff7a00, transparent);
}

/* LOGOS */
#sponsorTrack img {
    height: 26px;
    position: absolute;
    opacity: 0;
    transition: opacity 1s ease;
}

#sponsorTrack img.active {
    opacity: 1;
}

/* COVER */
.cover {
    height: 220px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* TEXTOS */
.text-box {
    position: relative;
    overflow: hidden;
    padding: 0 20px;
    margin-top: 10px;
}

.text-box::before,
.text-box::after {
    content: "";
    position: absolute;
    top: 0;
    width: 30px;
    height: 100%;
}

.text-box::before {
    left: 0;
    background: linear-gradient(to right, #0f0f0f, transparent);
}

.text-box::after {
    right: 0;
    background: linear-gradient(to left, #0f0f0f, transparent);
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
    animation: scrollText 12s linear infinite;
    font-size: 14px;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* PLAYER */
.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #ED2129;
    background: rgba(237,33,41,0.15);
    color: white;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(237,33,41,0.6);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px;
    padding: 20px;
}

.card {
    background: #141414;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 28px;
}

/* NEWS */
#newsDisplay {
    margin: 10px 20px 20px;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid #ED2129;
    background: #000;
    position: relative;
    overflow: hidden;
}

#newsDisplay::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shine 4s infinite;
}

@keyframes shine {
    to { left: 100%; }
}

#newsTicker {
    white-space: nowrap;
    animation: ticker 12s linear infinite;
}

@keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div id="sponsorTrack">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Brazil_flag_300.png" class="active">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Logo_Caixa_Econ%C3%B4mica_Federal.svg/320px-Logo_Caixa_Econ%C3%B4mica_Federal.svg.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Governo_do_Cear%C3%A1_logo.svg/320px-Governo_do_Cear%C3%A1_logo.svg.png">
  </div>
</div>

<div class="cover"></div>

<div class="text-box">
<span id="artistText" class="scroll-text">Carregando artista...</span>
</div>

<div class="text-box">
<span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"><br>Instagram
</div>

<div class="card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg"><br>Threads
</div>

<div class="card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg"><br>Participar
</div>
</div>

<div id="newsDisplay">
<div id="newsTicker">Carregando notícias...</div>
</div>

<div class="footer">MiB é made in Brasil, baby</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player = document.getElementById('radioPlayer');

function playRadio() {
player.src = "https://r10.ciclano.io/proxy/radiomib/stream";
player.play();
}

function stopRadio() {
player.pause();
}

setInterval(() => {
document.getElementById("artistText").innerText =
document.getElementById("ccArtist").innerText || "—";

document.getElementById("titleText").innerText =
document.getElementById("ccTitle").innerText || "—";
}, 2000);

/* LOGOS */
const logos = document.querySelectorAll("#sponsorTrack img");
let l = 0;
setInterval(()=>{
logos[l].classList.remove("active");
l = (l+1)%logos.length;
logos[l].classList.add("active");
},3000);

/* LINKS */
function openInsta(){window.open("https://www.instagram.com/radiomibprodutora/")}
function openThreads(){window.open("https://www.threads.net/@radiomibprodutora")}
function participar(){window.open("https://wa.me/5585988148344")}

/* NEWS */
const noticias=[
"🎵 Música brasileira em alta global",
"🌴 Ceará em destaque no turismo",
"✈️ Viagens internacionais em crescimento",
"🔬 Novas descobertas surpreendem o mundo"
];

let i=0;
setInterval(()=>{
document.getElementById("newsTicker").innerText=noticias[i];
i=(i+1)%noticias.length;
},4000);
</script>

</body>
</html>
