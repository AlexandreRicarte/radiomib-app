<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Comfortaa:700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Comfortaa', sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #0b0b0b;
    color: white;
}

/* TOPO */
.header {
    padding: 15px;
    background: linear-gradient(90deg, #ED2129, #ff7a00);
    overflow: hidden;
}

/* LOGOS */
#sponsorWrapper {
    width: 100%;
    overflow: hidden;
}

#sponsorTrack {
    display: flex;
    gap: 50px;
    align-items: center;
    animation: sponsorMove 12s linear infinite;
}

#sponsorTrack img {
    height: 30px;
    opacity: 0.9;
}

/* animação suave */
@keyframes sponsorMove {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.cover {
    height: 240px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

.section {
    padding: 20px;
    text-align: center;
}

.text3d {
    font-size: 22px;
    color: #ED2129;
}

.scroll-text {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    animation: scrollText 10s linear infinite;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #ED2129;
    background: rgba(237,33,41,0.1);
    margin: 10px;
    cursor: pointer;
    color: white;
    font-size: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
}

.card {
    background: #141414;
    padding: 15px;
    border-radius: 15px;
    cursor: pointer;
}

.icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.icon-card img {
    width: 28px;
    filter: invert(1);
}

/* NEWS */
#newsDisplay {
    margin-top: 20px;
    background: #000;
    border-radius: 15px;
    padding: 15px;
    border: 2px solid #ED2129;
}

#newsTicker {
    white-space: nowrap;
    animation: tickerMove 12s linear infinite;
}

@keyframes tickerMove {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<!-- TOPO COM LOGOS -->
<div class="header">
  <div id="sponsorWrapper">
    <div id="sponsorTrack">
      <img src="assets/ceara.png">
      <img src="assets/brasil.png">
      <img src="assets/caixa.png">
    </div>
  </div>
</div>

<div class="cover"></div>

<div class="section">

<div class="text3d">AO VIVO</div>

<span id="artistText" class="scroll-text">Carregando...</span>
<span id="titleText" class="scroll-text"></span>

<div>
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">

<div class="card icon-card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
<span>Instagram</span>
</div>

<div class="card icon-card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg">
<span>Threads</span>
</div>

<div class="card icon-card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg">
<span>Participar</span>
</div>

</div>

<div id="newsDisplay">
  <div id="newsTicker">Carregando notícias...</div>
</div>

</div>

<div class="footer">MiB é made in Brasil, baby</div>

</div>

<audio id="radioPlayer"></audio>

<script>
const player = document.getElementById('radioPlayer');

function playRadio() {
    player.src = "https://r10.ciclano.io/proxy/radiomib/stream";
    player.play();
}

function stopRadio() {
    player.pause();
}

/* LINKS */
function openInsta() {
    window.open("https://www.instagram.com/radiomibprodutora/");
}

function openThreads() {
    window.open("https://www.threads.net/@radiomibprodutora");
}

function participar() {
    window.open("https://wa.me/5585988148344");
}

/* NEWS */
const noticias = [
"🎵 Música brasileira em alta global",
"🌴 Turismo no Ceará cresce",
"✈️ Viagens internacionais voltam",
"🔬 Ciência surpreende o mundo"
];

let i = 0;

setInterval(() => {
document.getElementById("newsTicker").innerText = noticias[i];
i = (i + 1) % noticias.length;
}, 4000);
</script>

</body>
</html>
