<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Comfortaa:700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Comfortaa', sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #0b0b0b;
    color: white;
}

/* HEADER PREMIUM */
.header {
    padding: 15px;
    background: linear-gradient(90deg, #ED2129, #ff7a00);
    position: relative;
    overflow: hidden;
}

/* FADE LATERAL */
.header::before,
.header::after {
    content: "";
    position: absolute;
    top: 0;
    width: 40px;
    height: 100%;
    z-index: 2;
}

.header::before {
    left: 0;
    background: linear-gradient(to right, #ED2129, transparent);
}

.header::after {
    right: 0;
    background: linear-gradient(to left, #ff7a00, transparent);
}

/* LOGOS SUAVE (fade) */
#sponsorTrack {
    display: flex;
    justify-content: center;
    align-items: center;
}

#sponsorTrack img {
    height: 26px;
    position: absolute;
    opacity: 0;
    transition: opacity 1s ease;
}

#sponsorTrack img.active {
    opacity: 1;
}

/* COVER */
.cover {
    height: 240px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* ÁREA */
.section {
    padding: 20px;
    text-align: center;
}

/* TEXTO PREMIUM */
.text-box {
    position: relative;
    overflow: hidden;
    padding: 0 20px;
}

/* fade lateral */
.text-box::before,
.text-box::after {
    content: "";
    position: absolute;
    top: 0;
    width: 30px;
    height: 100%;
    z-index: 2;
}

.text-box::before {
    left: 0;
    background: linear-gradient(to right, #0b0b0b, transparent);
}

.text-box::after {
    right: 0;
    background: linear-gradient(to left, #0b0b0b, transparent);
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
    animation: scrollText 12s linear infinite;
}

@keyframes scrollText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* BOTÕES */
.btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #ED2129;
    background: rgba(237,33,41,0.1);
    margin: 10px;
    cursor: pointer;
    color: white;
    font-size: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
    padding: 0 10px;
}

.card {
    background: #141414;
    padding: 15px;
    border-radius: 15px;
    cursor: pointer;
}

.icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.icon-card img {
    width: 28px;
}

/* NEWS PREMIUM */
#newsDisplay {
    margin: 20px 15px;
    background: #000;
    border-radius: 15px;
    padding: 15px;
    border: 2px solid #ED2129;
    position: relative;
    overflow: hidden;
}

/* brilho animado */
#newsDisplay::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shine 4s infinite;
}

@keyframes shine {
    from { left: -100%; }
    to { left: 100%; }
}

#newsTicker {
    white-space: nowrap;
    animation: tickerMove 12s linear infinite;
}

@keyframes tickerMove {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div id="sponsorTrack">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Brazil_flag_300.png" class="active">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Logo_Caixa_Econ%C3%B4mica_Federal.svg/320px-Logo_Caixa_Econ%C3%B4mica_Federal.svg.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Governo_do_Cear%C3%A1_logo.svg/320px-Governo_do_Cear%C3%A1_logo.svg.png">
  </div>
</div>

<div class="cover"></div>

<div class="section">

<div class="text-box">
  <span id="artistText" class="scroll-text">Carregando artista...</span>
</div>

<div class="text-box">
  <span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div>
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">

<div class="card icon-card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg">
<span>Instagram</span>
</div>

<div class="card icon-card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg">
<span>Threads</span>
</div>

<div class="card icon-card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg">
<span>Participar</span>
</div>

</div>

<div id="newsDisplay">
  <div id="newsTicker">Carregando notícias...</div>
</div>

</div>

<div class="footer">MiB é made in Brasil, baby</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player = document.getElementById('radioPlayer');

function playRadio() {
    player.src = "https://r10.ciclano.io/proxy/radiomib/stream";
    player.play();
}

function stopRadio() {
    player.pause();
}

/* TEXTO */
setInterval(() => {
    document.getElementById("artistText").innerText =
        document.getElementById("ccArtist").innerText || "—";

    document.getElementById("titleText").innerText =
        document.getElementById("ccTitle").innerText || "—";
}, 2000);

/* LOGOS FADE */
const logos = document.querySelectorAll("#sponsorTrack img");
let l = 0;

setInterval(() => {
    logos[l].classList.remove("active");
    l = (l + 1) % logos.length;
    logos[l].classList.add("active");
}, 3000);

/* LINKS */
function openInsta() {
    window.open("https://www.instagram.com/radiomibprodutora/");
}

function openThreads() {
    window.open("https://www.threads.net/@radiomibprodutora");
}

function participar() {
    window.open("https://wa.me/5585988148344");
}

/* NEWS */
const noticias = [
"🎵 Música brasileira em alta global",
"🌴 Ceará cresce no turismo",
"✈️ Viagens internacionais bombando",
"🔬 Ciência revela novas descobertas"
];

let i = 0;

setInterval(() => {
document.getElementById("newsTicker").innerText = noticias[i];
i = (i + 1) % noticias.length;
}, 4000);
</script>

</body>
</html>
