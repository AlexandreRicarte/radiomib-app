<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio MIB</title>

<link href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap" rel="stylesheet" />

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #0d0d0d;
    color: #e5e5e5;
}

/* HEADER */
.header {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
}

/* PATROCINADORES - DESLIZAM PELA TELA */
#sponsorTrack {
    position: relative;
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    overflow: hidden;
}

#sponsorTrack a {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: slideSponsor linear infinite;
}

#sponsorTrack img {
    height: 60px;
    max-width: 180px;
    object-fit: contain;
    filter: brightness(1.3) contrast(1.1);
}

@keyframes slideSponsor {
    0% {
        left: 100%;
    }
    100% {
        left: -200px;
    }
}

#sponsorTrack a:nth-child(1) {
    animation-duration: 12s;
    animation-delay: 0s;
}

#sponsorTrack a:nth-child(2) {
    animation-duration: 12s;
    animation-delay: 4s;
}

#sponsorTrack a:nth-child(3) {
    animation-duration: 12s;
    animation-delay: 8s;
}

/* COVER */
.cover {
    height: 200px;
    background: url('https://raw.githubusercontent.com/AlexandreRicarte/logo-mib/main/logoboneconovo.png') center/contain no-repeat;
}

/* CONTAINER DE SCROLL - ARTISTA E MÚSICA */
.scroll-container {
    position: relative;
    overflow: hidden;
    padding: 8px 0;
    height: auto;
    min-height: 28px;
    width: 100%;
}

/* fade lateral */
.scroll-container::before,
.scroll-container::after {
    content: "";
    position: absolute;
    top: 0;
    width: 40px;
    height: 100%;
    z-index: 2;
}

.scroll-container::before {
    left: 0;
    background: linear-gradient(to right, #0d0d0d, transparent);
}

.scroll-container::after {
    right: 0;
    background: linear-gradient(to left, #0d0d0d, transparent);
}

.scroll-text {
    display: inline-block;
    white-space: nowrap;
    padding: 0 20px;
    animation: scrollText linear infinite;
    font-size: 13px;
}

@keyframes scrollText {
    0% { 
        transform: translateX(-100%); 
    }
    100% { 
        transform: translateX(100vw); 
    }
}

/* PLAYER */
.controls {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 10px;
}

.btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
}

/* REDES */
.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    padding: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s ease;
}

.card:hover {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
}

.card img {
    width: 22px;
    margin-bottom: 5px;
}

/* NEWS - ESTILO NOTICIÁRIO DE TV */
.news-bar {
    background: linear-gradient(90deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a1a 100%);
    border-top: 2px solid rgba(220, 20, 60, 0.6);
    border-bottom: 2px solid rgba(220, 20, 60, 0.6);
    overflow: hidden;
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    position: relative;
}

.news-track {
    white-space: nowrap;
    animation: scroll linear infinite;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #e5e5e5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

.footer {
    text-align: center;
    padding: 15px;
    font-size: 11px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div id="sponsorTrack">

<a href="https://www.coca-cola.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23F40000' width='320' height='320'/%3E%3Ctext x='160' y='180' font-size='80' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3ECoca%3C/text%3E%3Ctext x='160' y='260' font-size='80' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3ECola%3C/text%3E%3C/svg%3E" alt="Coca-Cola">
</a>

<a href="https://www.burgerking.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23FFC72C' width='320' height='320'/%3E%3Ctext x='160' y='180' font-size='60' font-weight='bold' fill='%23EC1C24' text-anchor='middle' font-family='Arial'%3EBURGER%3C/text%3E%3Ctext x='160' y='260' font-size='60' font-weight='bold' fill='%23EC1C24' text-anchor='middle' font-family='Arial'%3EKING%3C/text%3E%3C/svg%3E" alt="Burger King">
</a>

<a href="https://www.mcdonalds.com" target="_blank">
<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Crect fill='%23DA291C' width='320' height='320'/%3E%3Ctext x='160' y='200' font-size='100' font-weight='bold' fill='%23FFC72C' text-anchor='middle' font-family='Arial'%3EM%3C/text%3E%3C/svg%3E" alt="McDonald's">
</a>

</div>
</div>

<div class="cover"></div>

<div class="scroll-container">
<span id="artistText" class="scroll-text">Carregando artista...</span>
</div>

<div class="scroll-container">
<span id="titleText" class="scroll-text">Carregando música...</span>
</div>

<div class="controls">
<button class="btn" onclick="playRadio()">▶</button>
<button class="btn" onclick="stopRadio()">■</button>
</div>

<div class="grid">
<div class="card" onclick="openInsta()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" alt="Instagram">
Instagram
</div>

<div class="card" onclick="openThreads()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/threads.svg" alt="Threads">
Threads
</div>

<div class="card" onclick="participar()">
<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg" alt="WhatsApp">
Participar
</div>
</div>

<div class="news-bar">
<div id="newsTrack" class="news-track"></div>
</div>

<div class="footer">MiB Digital Broadcast</div>

</div>

<audio id="radioPlayer"></audio>

<span id="ccArtist" class="cc_streaminfo" data-type="trackartist" data-username="radiomib" style="display:none"></span>
<span id="ccTitle" class="cc_streaminfo" data-type="tracktitle" data-username="radiomib" style="display:none"></span>

<script src="https://r10.ciclano.io:2199/system/streaminfo.js"></script>

<script>
const player=document.getElementById('radioPlayer');

function playRadio(){
player.src="https://r10.ciclano.io/proxy/radiomib/stream";
player.play();
}

function stopRadio(){
player.pause();
}

/* ATUALIZA TEXTO + VELOCIDADE DINÂMICA */
function atualizarTexto(){
const artist=document.getElementById("ccArtist").innerText || "—";
const title=document.getElementById("ccTitle").innerText || "—";

const artistEl=document.getElementById("artistText");
const titleEl=document.getElementById("titleText");

artistEl.innerText=artist;
titleEl.innerText=title;

/* velocidade proporcional - mais lento para textos curtos */
const artistDuration = Math.max(10, artist.length * 0.25);
const titleDuration = Math.max(10, title.length * 0.25);

artistEl.style.animationDuration = artistDuration + "s";
titleEl.style.animationDuration = titleDuration + "s";
}

setInterval(atualizarTexto,2000);

/* news */
const noticias=[
"Música brasileira em crescimento global",
"Turismo no Ceará bate recordes",
"Viagens internacionais retomam força",
"Descobertas científicas avançam rapidamente"
];

const track=document.getElementById("newsTrack");

track.innerText = noticias.join("   •   ") + "   •   " + noticias.join("   •   ");

const duration = track.innerText.length * 0.25;
track.style.animationDuration = duration + "s";
</script>

</body>
</html>
