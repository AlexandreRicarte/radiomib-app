<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MIB Indoor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #111;
}

.logo {
  font-size: 26px;
  font-weight: 700;
  color: #ED2129;
}

/* PLAYER */
.radio-player {
  display: flex;
  align-items: center;
  gap: 12px;
}

#playBtn {
  background: #ED2129;
  border: none;
  color: white;
  padding: 10px 14px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
}

.now-playing {
  max-width: 300px;
  overflow: hidden;
  white-space: nowrap;
}

#track {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 12s linear infinite;
}

@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* HERO */
#hero {
  position: relative;
  height: 50vh;
}

#hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  bottom: 30px;
  left: 30px;
  right: 30px;
}

.hero-overlay h1 {
  font-size: 34px;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  padding: 20px;
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.04);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
  font-size: 16px;
}

@media (max-width: 768px) {
  #hero {
    height: 35vh;
  }

  .hero-overlay h1 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">MiB</div>

  <div class="radio-player">
    <button id="playBtn">▶</button>
    <div class="now-playing">
      <span id="track">Rádio MiB ao vivo</span>
    </div>
  </div>
</header>

<main>

<section id="hero">
  <img id="hero-img">
  <div class="hero-overlay">
    <h1 id="hero-title"></h1>
  </div>
</section>

<section id="grid"></section>

</main>

<audio id="radio" autoplay></audio>

<script>
// CONFIG
const CONFIG = {
  radioStream: "https://r10.ciclano.io/proxy/radiomib/stream",
  rss: "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419",
  heroRotation: 5000,
  maxNews: 9
};

let news = [];
let heroIndex = 0;

// RADIO
const audio = document.getElementById("radio");
const btn = document.getElementById("playBtn");

audio.src = CONFIG.radioStream;

// tentativa de autoplay (TV geralmente permite)
audio.play().catch(() => {
  console.log("Autoplay bloqueado até interação");
});

btn.onclick = () => {
  if (audio.paused) {
    audio.play();
    btn.innerText = "⏸";
  } else {
    audio.pause();
    btn.innerText = "▶";
  }
};

// LOAD NEWS
async function loadNews() {
  try {
    const res = await fetch(CONFIG.rss);
    const data = await res.json();

    news = data.items || [];

    renderHero();
    renderGrid();
    startHeroRotation();

  } catch (e) {
    console.log("Erro RSS:", e);
  }
}

// HERO
function renderHero() {
  if (!news.length) return;

  const item = news[heroIndex];

  document.getElementById("hero-img").src =
    item.thumbnail || "https://via.placeholder.com/1280x720";

  document.getElementById("hero-title").innerText =
    item.title || "";
}

function startHeroRotation() {
  setInterval(() => {
    heroIndex = (heroIndex + 1) % news.length;
    renderHero();
  }, CONFIG.heroRotation);
}

// GRID
function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  news.slice(0, CONFIG.maxNews).forEach(item => {
    const img = item.thumbnail || "https://via.placeholder.com/300x200";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <a href="${item.link}" target="_blank">
        <img src="${img}" loading="lazy">
        <h3>${item.title}</h3>
      </a>
    `;

    grid.appendChild(card);
  });
}

// START
loadNews();
</script>

</body>
</html>
